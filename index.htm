<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IZAKAYA PDV - AJUSTADO</title>
    <style>
        :root {
            --bg: #1e1e2e; --card: #181825; --btn-item: #313244;
            --texto: #cdd6f4; --subtexto: #9399b2;
            --primaria: #89b4fa; --sucesso: #a6e3a1; 
            --alerta: #f9e2af; --perigo: #f38ba8; --borda: #45475a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--texto); font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .pdv-container { width: 95%; max-width: 380px; background: var(--card); border-radius: 12px; padding: 10px; border: 1px solid var(--borda); }

        /* TABELA DE MESAS - TAMANHO COMPACTO */
        .grid-mesas { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-bottom: 10px; }
        .btn-mesa { aspect-ratio: 1/1; border: 1px solid var(--borda); background: #111; color: var(--texto); font-size: 0.8rem; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-mesa.sel { border: 2px solid #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .m-lanc { background: var(--alerta) !important; color: #000 !important; }
        .m-imp { background: var(--perigo) !important; color: #fff !important; }
        .m-pago { background: var(--sucesso) !important; color: #000 !important; }

        /* DISPLAY EQUILIBRADO */
        .display { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--borda); }
        .display span { font-size: 0.9rem; font-weight: bold; }
        .display b { font-size: 1.8rem; color: var(--primaria); }

        /* MENU - GRADE 5 COLUNAS */
        .grid-menu { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .btn-item { aspect-ratio: 1/1; background: var(--btn-item); border: 1px solid var(--borda); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: var(--texto); border-radius: 8px; padding: 2px; }
        .btn-item .n { font-size: 0.55rem; font-weight: bold; text-align: center; margin-bottom: 2px; text-transform: uppercase; }
        .btn-item .p { font-size: 0.8rem; font-weight: 800; color: var(--primaria); }

        /* AÇÕES */
        .acoes { display: flex; gap: 6px; margin-top: 10px; }
        .btn-acao { flex: 1; padding: 14px 2px; border: none; font-weight: bold; border-radius: 8px; font-size: 0.85rem; cursor: pointer; text-transform: uppercase; }
        
        /* MODAIS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .modal-c { background: var(--card); padding: 15px; border-radius: 12px; width: 90%; max-height: 85%; overflow-y: auto; border: 1px solid var(--borda); }
        
        .r-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; font-size: 0.95rem; }
        .btn-del { background: var(--perigo); color: white; border: none; border-radius: 4px; padding: 4px 8px; font-weight: bold; font-size: 0.8rem; cursor: pointer; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; color: #000; background: #fff; padding: 10px; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="pdv-container">
        <div class="grid-mesas" id="div-mesas"></div>
        <div class="display">
            <span id="label-mesa">MESA --</span>
            <b id="val-total">R$ 0,00</b>
        </div>
        <div class="grid-menu" id="div-menu"></div>
        <div class="acoes">
            <button class="btn-acao" onclick="abrirRel()" style="background:#333; color:#fff; flex:0; width:50px">📊</button>
            <button id="btn-10" class="btn-acao" onclick="add10()" style="background:#111; color:#777; flex:0; width:50px; font-size: 0.7rem;">+10%</button>
            <button id="btn-f" class="btn-acao" onclick="fluxo()" style="background:#313244; color:#fff">LIVRE</button>
        </div>
    </div>

    <div id="mod-rel" class="modal">
        <div class="modal-c" id="print-area">
            <h3 style="text-align:center">CONTA MESA <span id="r-mesa"></span></h3>
            <div id="r-lista" style="margin-top:10px"></div>
            <div style="margin-top:10px; border-top:1px solid #555; padding-top:10px">
                <p id="r-taxa" style="text-align:right; font-size:0.8rem"></p>
                <h3 id="r-total" style="text-align:right"></h3>
            </div>
            <div class="acoes no-print">
                <button class="btn-acao" onclick="fechar()" style="background:#444; color:#fff">VOLTAR</button>
                <button class="btn-acao" onclick="window.print()" style="background:var(--primaria); color:#000">🖨️ IMPRIMIR</button>
            </div>
        </div>
    </div>

    <div id="mod-ger" class="modal">
        <div class="modal-c" style="text-align:center">
            <span style="font-size:4rem">👨🏿‍💼</span>
            <p style="margin:15px 0; font-weight: bold;">Mesa <span id="g-mesa"></span> paga?</p>
            <div class="acoes">
                <button class="btn-acao" onclick="fechar()" style="background:#444; color:#fff">NÃO</button>
                <button class="btn-acao" onclick="finalizar()" style="background:var(--sucesso); color:#000">SIM</button>
            </div>
        </div>
    </div>

    <script>
        let mSel = null;
        let db = JSON.parse(localStorage.getItem('IZK_DATA_V5')) || {};
        const itens = [
            {n:'Gyoza', p:28}, {n:'Karaage', p:32}, {n:'Edamame', p:18}, {n:'Shimeji', p:35}, {n:'Suno', p:15},
            {n:'Yakitori', p:12}, {n:'Tebasaki', p:26}, {n:'Okono', p:42}, {n:'Takoya', p:30}, {n:'Tempura', p:38},
            {n:'Saque D', p:22}, {n:'Saque G', p:85}, {n:'Chopp', p:14}, {n:'Cerveja', p:18}, {n:'Highball', p:28},
            {n:'Cha V.', p:8}, {n:'Melona', p:12}, {n:'Misso', p:10}, {n:'Suco', p:9}, {n:'Agua', p:6}
        ];

        function render() {
            const d = document.getElementById('div-mesas'); d.innerHTML = '';
            for(let i=1; i<=20; i++){
                if(!db[i]) db[i] = {s:'livre', t:0, i:[], x:false};
                const b = document.createElement('button');
                b.className = `btn-mesa m-${db[i].s} ${mSel==i?'sel':''}`;
                b.innerText = i; b.onclick = () => { mSel=i; att(); };
                d.appendChild(b);
            }
        }

        function lancar(it) {
            if(!mSel) return;
            let m = db[mSel];
            if(m.s === 'pago' || m.s === 'livre') { m.i=[]; m.t=0; m.x=false; }
            m.s = 'lanc'; m.i.push({...it}); m.t += it.p;
            save(); att();
        }

        function removerItem(idx) {
            let m = db[mSel];
            m.t -= m.i[idx].p;
            m.i.splice(idx, 1);
            if(m.i.length === 0) m.s = 'livre';
            save(); att(); abrirRel();
        }

        function att() {
            render(); if(!mSel) return;
            const m = db[mSel]; const total = m.x ? m.t * 1.1 : m.t;
            document.getElementById('val-total').innerText = 'R$ ' + total.toFixed(2);
            document.getElementById('label-mesa').innerText = 'MESA ' + mSel;
            document.getElementById('btn-10').style.background = m.x ? 'var(--sucesso)' : '#111';
            const bf = document.getElementById('btn-f');
            if(m.s==='lanc') { bf.innerText='IMPRIMIR'; bf.style.background='var(--perigo)'; }
            else if(m.s==='imp') { bf.innerText='PAGAR'; bf.style.background='var(--sucesso)'; bf.style.color='#000'; }
            else if(m.s==='pago') { bf.innerText='LIMPAR'; bf.style.background='#fff'; bf.style.color='#000'; }
            else { bf.innerText='LIVRE'; bf.style.background='#313244'; bf.style.color='#fff'; }
        }

        function fluxo() {
            if(!mSel) return; let m = db[mSel];
            if(m.s==='lanc') m.s='imp';
            else if(m.s==='imp') { document.getElementById('g-mesa').innerText=mSel; document.getElementById('mod-ger').style.display='flex'; return; }
            else if(m.s==='pago') { m.s='livre'; m.t=0; m.i=[]; m.x=false; }
            save(); att();
        }

        function abrirRel() {
            if(!mSel) return; const m = db[mSel];
            document.getElementById('r-mesa').innerText = mSel;
            document.getElementById('r-lista').innerHTML = m.i.map((it, idx) => `
                <div class="r-item">
                    <span>${it.n}</span>
                    <span><b>R$ ${it.p.toFixed(2)}</b> <button class="btn-del no-print" onclick="removerItem(${idx})">X</button></span>
                </div>`).join('');
            document.getElementById('r-taxa').innerText = m.x ? "Taxa (10%) inclusa" : "";
            document.getElementById('r-total').innerText = "TOTAL: R$ " + (m.x ? m.t * 1.1 : m.t).toFixed(2);
            document.getElementById('mod-rel').style.display='flex';
        }

        function add10() { if(mSel) { db[mSel].x = !db[mSel].x; save(); att(); } }
        function finalizar() { db[mSel].s='pago'; fechar(); save(); att(); }
        function fechar() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function save() { localStorage.setItem('IZK_DATA_V5', JSON.stringify(db)); }

        const mnu = document.getElementById('div-menu');
        itens.forEach(it => {
            const b = document.createElement('button'); b.className = 'btn-item';
            b.innerHTML = `<span class="n">${it.n}</span><span class="p">R$ ${it.p}</span>`;
            b.onclick = () => lancar(it); mnu.appendChild(b);
        });
        render();
    </script>
</body>
</html>
