<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IZAKAYA PDV - FONTE ALTA</title>
    <style>
        :root {
            --bg: #1e1e2e; --card: #181825; --btn-item: #313244;
            --texto: #ffffff; --subtexto: #bac2de;
            --primaria: #89b4fa; --sucesso: #a6e3a1; 
            --alerta: #f9e2af; --perigo: #f38ba8; --borda: #45475a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--texto); font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .pdv-container { width: 98%; max-width: 450px; background: var(--card); border-radius: 16px; padding: 15px; border: 2px solid var(--borda); }

        /* TABELA DE MESAS MAIOR */
        .grid-mesas { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-mesa { aspect-ratio: 1.2/1; border: 1px solid var(--borda); background: #111; color: var(--texto); font-size: 1.2rem; font-weight: 900; border-radius: 8px; cursor: pointer; }
        .btn-mesa.sel { border: 3px solid #fff; transform: scale(1.05); }
        .m-lanc { background: var(--alerta) !important; color: #000 !important; }
        .m-imp { background: var(--perigo) !important; color: #fff !important; }
        .m-pago { background: var(--sucesso) !important; color: #000 !important; }

        /* DISPLAY COM FONTE GRANDE */
        .display { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--borda); }
        .display span { font-size: 1.1rem; font-weight: bold; color: var(--subtexto); }
        .display b { font-size: 2.5rem; color: var(--sucesso); letter-spacing: -1px; }

        /* MENU COM TEXTO LEGÍVEL */
        .grid-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-item { aspect-ratio: 1/1; background: var(--btn-item); border: 1px solid var(--borda); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: var(--texto); border-radius: 12px; padding: 5px; }
        .btn-item .n { font-size: 0.75rem; font-weight: 800; text-align: center; margin-bottom: 5px; text-transform: uppercase; line-height: 1.1; }
        .btn-item .p { font-size: 1rem; font-weight: 900; color: var(--primaria); }

        /* BOTÕES DE AÇÃO */
        .acoes { display: flex; gap: 10px; margin-top: 15px; }
        .btn-acao { flex: 1; padding: 18px 5px; border: none; font-weight: 900; border-radius: 12px; font-size: 1rem; cursor: pointer; text-transform: uppercase; }
        
        /* MODAIS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .modal-c { background: var(--card); padding: 25px; border-radius: 20px; width: 92%; max-height: 85%; overflow-y: auto; border: 2px solid var(--borda); }
        
        .r-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; font-size: 1.1rem; }
        .btn-del { background: var(--perigo); color: white; border: none; border-radius: 8px; padding: 8px 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; background: #fff !important; color: #000 !important; font-size: 14pt; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="pdv-container">
        <div class="grid-mesas" id="div-mesas"></div>
        
        <div class="display">
            <span id="label-mesa">MESA --</span>
            <b id="val-total">R$ 0,00</b>
        </div>

        <div class="grid-menu" id="div-menu"></div>

        <div class="acoes">
            <button class="btn-acao" onclick="abrirRel()" style="background:#333; color:#fff; flex:0; width:70px; font-size: 1.5rem;">📊</button>
            <button id="btn-10" class="btn-acao" onclick="add10()" style="background:#111; color:#777; flex:0; width:70px; font-size: 0.9rem;">+10%</button>
            <button id="btn-f" class="btn-acao" onclick="fluxo()" style="background:#313244; color:#fff">LIVRE</button>
        </div>
    </div>

    <div id="mod-rel" class="modal">
        <div class="modal-c" id="print-area">
            <h1 style="text-align:center; color: var(--primaria); margin-bottom: 5px;">IZAKAYA</h1>
            <h2 style="text-align:center; margin-bottom:20px">CONTA MESA <span id="r-mesa"></span></h2>
            <div id="r-lista"></div>
            <div style="margin-top:20px; border-top:2px solid #555; padding-top:15px">
                <p id="r-taxa" style="text-align:right; font-size:1rem; color: var(--sucesso)"></p>
                <h2 id="r-total" style="text-align:right; font-size: 2.2rem;"></h2>
            </div>
            <div class="acoes no-print">
                <button class="btn-acao" onclick="fechar()" style="background:#444; color:#fff">VOLTAR</button>
                <button class="btn-acao" onclick="window.print()" style="background:var(--primaria); color:#000">🖨️ IMPRIMIR</button>
            </div>
        </div>
    </div>

    <div id="mod-ger" class="modal">
        <div class="modal-c" style="text-align:center; padding: 40px 20px;">
            <span style="font-size:6rem">👨🏿‍💼</span>
            <h2 style="margin:20px 0">Confirmar pagamento da Mesa <span id="g-mesa"></span>?</h2>
            <div class="acoes">
                <button class="btn-acao" onclick="fechar()" style="background:#444; color:#fff">NÃO</button>
                <button class="btn-acao" onclick="finalizar()" style="background:var(--sucesso); color:#000">SIM, PAGO</button>
            </div>
        </div>
    </div>

    <script>
        let mSel = null;
        let db = JSON.parse(localStorage.getItem('IZK_DATA_V4')) || {};
        const itens = [
            {n:'Gyoza (6)', p:28}, {n:'Karaage', p:32}, {n:'Edamame', p:18}, {n:'Shimeji', p:35}, {n:'Sunomono', p:15},
            {n:'Yakitori', p:12}, {n:'Tebasaki', p:26}, {n:'Takoyaki', p:30}, {n:'Tempura', p:38}, {n:'Miso', p:10},
            {n:'Saque Dose', p:22}, {n:'Saque Gar.', p:85}, {n:'Chopp', p:14}, {n:'Cerveja JP', p:18}, {n:'Highball', p:28},
            {n:'Cha Verde', p:8}, {n:'Melona', p:12}, {n:'Suco', p:9}, {n:'Agua S/G', p:6}, {n:'Agua C/G', p:7}
        ];

        function render() {
            const d = document.getElementById('div-mesas'); d.innerHTML = '';
            for(let i=1; i<=20; i++){
                if(!db[i]) db[i] = {s:'livre', t:0, i:[], x:false};
                const b = document.createElement('button');
                b.className = `btn-mesa m-${db[i].s} ${mSel==i?'sel':''}`;
                b.innerText = i; b.onclick = () => { mSel=i; att(); };
                d.appendChild(b);
            }
        }

        function lancar(it) {
            if(!mSel) return;
            let m = db[mSel];
            if(m.s === 'pago' || m.s === 'livre') { m.i=[]; m.t=0; m.x=false; }
            m.s = 'lanc'; m.i.push({...it}); m.t += it.p;
            save(); att();
        }

        function removerItem(idx) {
            let m = db[mSel];
            m.t -= m.i[idx].p;
            m.i.splice(idx, 1);
            if(m.i.length === 0) m.s = 'livre';
            save(); att(); abrirRel();
        }

        function att() {
            render(); if(!mSel) return;
            const m = db[mSel]; const total = m.x ? m.t * 1.1 : m.t;
            document.getElementById('val-total').innerText = 'R$ ' + total.toFixed(2);
            document.getElementById('label-mesa').innerText = 'MESA ' + mSel;
            document.getElementById('btn-10').style.background = m.x ? 'var(--sucesso)' : '#111';
            document.getElementById('btn-10').style.color = m.x ? '#000' : '#777';
            const bf = document.getElementById('btn-f');
            if(m.s==='lanc') { bf.innerText='IMPRIMIR'; bf.style.background='var(--perigo)'; }
            else if(m.s==='imp') { bf.innerText='PAGAR'; bf.style.background='var(--sucesso)'; bf.style.color='#000'; }
            else if(m.s==='pago') { bf.innerText='LIMPAR'; bf.style.background='#fff'; bf.style.color='#000'; }
            else { bf.innerText='LIVRE'; bf.style.background='#313244'; bf.style.color='#fff'; }
        }

        function fluxo() {
            if(!mSel) return; let m = db[mSel];
            if(m.s==='lanc') m.s='imp';
            else if(m.s==='imp') { document.getElementById('g-mesa').innerText=mSel; document.getElementById('mod-ger').style.display='flex'; return; }
            else if(m.s==='pago') { m.s='livre'; m.t=0; m.i=[]; m.x=false; }
            save(); att();
        }

        function abrirRel() {
            if(!mSel) return; const m = db[mSel];
            document.getElementById('r-mesa').innerText = mSel;
            document.getElementById('r-lista').innerHTML = m.i.map((it, idx) => `
                <div class="r-item">
                    <span>${it.n}</span>
                    <span style="display: flex; align-items: center;">
                        <b style="margin-right: 15px;">R$ ${it.p.toFixed(2)}</b>
                        <button class="btn-del no-print" onclick="removerItem(${idx})">X</button>
                    </span>
                </div>
            `).join('');
            document.getElementById('r-taxa').innerText = m.x ? "+ 10% de Serviço Incluso" : "";
            document.getElementById('r-total').innerText = "R$ " + (m.x ? m.t * 1.1 : m.t).toFixed(2);
            document.getElementById('mod-rel').style.display='flex';
        }

        function add10() { if(mSel) { db[mSel].x = !db[mSel].x; save(); att(); } }
        function finalizar() { db[mSel].s='pago'; fechar(); save(); att(); }
        function fechar() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function save() { localStorage.setItem('IZK_DATA_V4', JSON.stringify(db)); }

        const mnu = document.getElementById('div-menu');
        itens.forEach(it => {
            const b = document.createElement('button'); b.className = 'btn-item';
            b.innerHTML = `<span class="n">${it.n}</span><span class="p">R$ ${it.p}</span>`;
            b.onclick = () => lancar(it); mnu.appendChild(b);
        });
        render();
    </script>
</body>
</html>
