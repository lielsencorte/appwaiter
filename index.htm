<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IZAKAYA PDV PRO</title>
    <style>
        :root {
            --bg: #1e1e2e; --card: #181825; --btn-item: #313244;
            --texto: #cdd6f4; --subtexto: #7f849c;
            --primaria: #89b4fa; --sucesso: #a6e3a1; 
            --alerta: #f9e2af; --perigo: #f38ba8; --borda: #45475a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--texto); font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        .pdv-container { width: 400px; background: var(--card); border-radius: 16px; padding: 12px; border: 1px solid var(--borda); position: relative; }

        .grid-mesas { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-bottom: 12px; }
        .btn-mesa { aspect-ratio: 1/1; border: 1px solid var(--borda); background: #111; color: var(--texto); font-size: 0.9rem; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-mesa.selecionada { border: 2px solid #fff; transform: scale(1.05); }
        .status-lancando { background: var(--alerta) !important; color: #000 !important; }
        .status-impresso { background: var(--perigo) !important; color: #fff !important; }
        .status-limpeza { background: var(--sucesso) !important; color: #000 !important; }

        .display-pdv { background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid var(--borda); padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .display-pdv b { font-size: 2rem; color: var(--primaria); }

        .grid-menu { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .btn-item { aspect-ratio: 1/1; background: var(--btn-item); border: 1px solid var(--borda); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: var(--texto); border-radius: 10px; }
        .btn-item .nome { font-size: 0.55rem; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; text-align: center; }
        .btn-item .preco { font-size: 0.8rem; font-weight: 800; color: var(--primaria); }

        .acoes { display: flex; gap: 8px; margin-top: 12px; }
        .btn-acao { flex: 1; padding: 15px 5px; border: none; font-weight: 800; border-radius: 10px; font-size: 0.85rem; cursor: pointer; text-transform: uppercase; }
        .btn-sec { background: #313244; color: var(--texto); width: 60px; flex: 0; font-size: 1.2rem; }
        .btn-taxa { background: #1a1a1a; border: 1px solid var(--borda); color: var(--subtexto); width: 60px; flex: 0; font-size: 0.7rem; }
        .taxa-on { background: var(--sucesso) !important; color: #000 !important; }

        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; flex-direction: column; justify-content: center; align-items: center; border-radius: 16px; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--borda); width: 100%; max-height: 90%; display: flex; flex-direction: column; }
        .lista { flex: 1; overflow-y: auto; margin: 10px 0; border-top: 1px solid #333; }
        .linha { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
